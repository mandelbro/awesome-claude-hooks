name: Test Hooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x hooks/*.sh hooks/lib/*.sh tests/*.sh install.sh uninstall.sh

      - name: Run tests
        run: bash tests/run-tests.sh

      - name: ShellCheck
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --exclude=SC1091 hooks/*.sh hooks/lib/*.sh install.sh uninstall.sh tests/*.sh
